    capacity: 6
  staff:
    capacity: 5
    monthly_pattern_basis: absolute
    monthly_pattern:
      Jan: 5
      Feb: 5
      Mar: 4
      Apr: 4
      May: 3
      Jun: 4
      Jul: 3
      Aug: 2
      Sep: 4
      Oct: 5
      Nov: 5
      Dec: 2
  testing_capacity: 5

# Collective leave density — bouwvak tradition means concentrated summer leave; Christmas/NY bridge.
national_leave_bands:
