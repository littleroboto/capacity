    from: '2026-07-20'
    to: '2026-08-16'
    capacity_multiplier: 0.62
  - label: Christmas/New Year bridge
    from: '2026-12-23'
    to: '2027-01-02'
    capacity_multiplier: 0.42
  - label: Summer leave (bouwvak period) 2027
    from: '2027-07-19'
    to: '2027-08-15'
    capacity_multiplier: 0.62
  - label: Christmas/New Year bridge 2027
    from: '2027-12-23'
    to: '2028-01-02'
    capacity_multiplier: 0.42

# BAU — routine workload + how heavy Market IT / restaurant support is each weekday (0–1).
# (Not tech_programmes — those are dated change projects.)

