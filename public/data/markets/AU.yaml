# Australia ‚Äî NSW Eastern school stubs. Southern summer peak Dec‚ÄìJan; pipeline adds AU-specific late-Dec/Jan store lift.

# Market identity: `market` is the stable id (routing, manifests, holiday catalogs); `title` is display-only in the UI.
# `risk_heatmap_gamma_tech` / `risk_heatmap_gamma_business` shape how each lens maps combined risk into heatmap colour (transfer-curve exponent; higher ‚Üí more separation in the mid bands).
# `resources` nominal caps: `labs.capacity` integrated-test labs; `staff.capacity` team headcount denominator; `testing_capacity` optional parallel-test slots for lab utilisation (defaults to lab count when omitted).
market: AU
title: Australia
risk_heatmap_gamma_tech: 2.5
risk_heatmap_gamma_business: 2.5
resources:
  labs:
    capacity: 5
  staff:
    capacity: 4
  testing_capacity: 10

# BAU baseline demand (business-as-usual): repeating weekday loads that sit under tech rhythm, campaigns, and releases in the phase engine.
# `days_in_use` picks which weekdays carry that strip (`mo`‚Ä¶`sun` tokens). `weekly_cycle` sets nominal lab vs team mass (`labs_required`, `staff_required`).
# `support_days` widens each entry‚Äôs support window along the week (half-weight BAU support loads on weekdays inside that span, up to Saturday). `integration_tests` adds an extra anchor day with labs-only load alongside the modern weekly BAU.
bau:
  days_in_use: [mo, tu, we, th, fr]
  weekly_cycle:
    labs_required: 1
    staff_required: 1
    support_days: 1
  integration_tests:
    day: Mon
    labs: 1

# Campaigns: each list item is one programme. `start_date` anchors the live window; `duration` is the live segment length in days on the calendar.
# `testing_prep_duration` is the load-bearing **prep** runway before live (days). `impact` picks default commercial intensity when you omit a full `load` map; `business_uplift` scales business-side uplift in the risk blend (parser-capped).
# `campaign_support` supplies lab/team-style staffing folded into **prep** loads; `live_campaign_support` does the same for the **live** / sustain phase (alongside optional `live_support_load`, etc., in richer entries).
campaigns:
  - name: easter_autumn_term_peak_2026
    start_date: '2026-04-07'
    duration: 14
    testing_prep_duration: 30
    impact: very_high
    business_uplift: 1.0
    campaign_support:
      labs_required: 1
      tech_staff: 1
    live_campaign_support:
      labs_required: 1
      tech_staff: 1
  - name: spring_sep_oct_term_peak_2026
    start_date: '2026-09-28'
    duration: 12
    testing_prep_duration: 30
    impact: high
    business_uplift: 1.0
    campaign_support:
      labs_required: 1
      tech_staff: 1
    live_campaign_support:
      labs_required: 1
      tech_staff: 1
  - name: summer_dec_jan_peak_2026
    start_date: '2026-12-18'
    duration: 42
    testing_prep_duration: 30
    impact: very_high
    business_uplift: 1.0
    campaign_support:
      labs_required: 1
      tech_staff: 1
    live_campaign_support:
      labs_required: 1
      tech_staff: 1

