# Australia — NSW Eastern school terms (stub in `holidayCalc.ts`).
#
# Calendar is shifted vs Northern markets: southern summer = Dec–Jan (school summer holidays over
# Christmas/Jan). Expect Advent-style retail build through November–mid-December, then peak trading
# and promos across the long summer break. July is a shorter winter school break (not “summer peak”).
# Pipeline adds AU-only store lift for late Dec–Jan on top of global December retail seasoning.
country: AU

resources:
  labs:
    capacity: 5
  teams:
    pos_team:
      size: 4
      sme_depth: 2

bau:
  weekly_promo_cycle:
    day: Tue
    labs: 2
    support_days: 2
  integration_tests:
    frequency: weekly
    day: Thu
    labs: 1

# Easter ≈ southern autumn term break; Sep–Oct ≈ southern spring holidays; summer_dec_jan = long
# summer programme (prep from ~late Oct through festive build into Jan live + promos).
