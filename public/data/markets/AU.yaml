# Holiday capacity shaping for lab/team utilisation denominators (which calendar days count as holidays live in `public_holidays` / `school_holidays`).
# `capacity_taper_days`: when >0, holiday ‚Äústress‚Äù ramps smoothly within ¬±N days of each listed holiday (easier build-up/cool-down); omit or 0 = stress only on exact holiday dates.
# `lab_capacity_scale`: at full holiday stress, effective lab+team caps move toward this fraction of normal capacity (engine-clamped ~0.12‚Äì1; higher = less pinch).
holidays:
  capacity_taper_days: 3
  lab_capacity_scale: 0.5

operating_windows:
