holidays:
  auto_public: true
  auto_school: true
  capacity_taper_days: 3

stress_correlations:
  school_holidays:
    store_pressure_mult: 1.12
    lab_load_mult: 1.06
    team_load_mult: 1.09
    backend_load_mult: 1.04
    ops_activity_mult: 1.07
    commercial_activity_mult: 1.12
    lab_team_capacity_mult: 0.93

trading:
  weekly_pattern:
    default: medium
    Thu: high
    Fri: high
    Sat: very_high
    Sun: high
  seasonal:
    # January = southern midsummer; July = cooler / winter-school-hol stretch (lower cosine peak).
    peak_month: 1
    amplitude: 0.2

tech:
  weekly_pattern:
    default: medium
    Mon: high
    Tue: very_high
    Thu: high
    Fri: very_high
    Sat: high
    Sun: low
  labs_scale: 1.3
  teams_scale: 0.8
