    start: '2026-11-01'
    end: '2026-12-23'
    ramp_in_days: 14
    ramp_out_days: 8
    envelope: smoothstep
    store_pressure_mult: 1.07
    commercial_activity_mult: 1.14
    lab_load_mult: 1.04
    team_load_mult: 1.04

# Store-trading rhythm (modeled store / restaurant demand): `weekly_pattern` sets a 0‚Äì1 level per weekday (raw numbers or tier names like `low` / `medium` / `high` / `very_high` after parse).
# `monthly_pattern` scales that by calendar month; `seasonal` applies a gentle annual wave around `peak_month` with `amplitude`. `payday_month_peak_multiplier` lifts the base in the first part of each month.
# `campaign_store_boost_prep` and `campaign_store_boost_live` add fractional uplift on that base during campaign prep vs live; optional `campaign_effect_scale` in the same block scales both boosts and business-side campaign risk.
trading:
  campaign_store_boost_prep: 0
  campaign_store_boost_live: 0.28
  payday_month_peak_multiplier: 1.12
  monthly_pattern:
    Jan: 0.94
    Feb: 0.90
    Mar: 0.78
    Apr: 0.70
    May: 0.62
    Jun: 0.52
    Jul: 0.48
    Aug: 0.50
    Sep: 0.60
    Oct: 0.70
    Nov: 0.82
    Dec: 1.0
  weekly_pattern:
    Mon: 0.6
    Tue: 0.7
    Wed: 0.8
    Thu: 0.9
    Fri: 1.0
    Sat: 1.0
    Sun: 0.8
  seasonal:
    peak_month: 1
    amplitude: 0.2

# BAU tech-load rhythm: `weekly_pattern` resolves each weekday to a 0‚Äì1 intensity (tiers + `default` / `weekdays` / `weekend` shortcuts are expanded in the parser); the engine emits a daily ‚ÄúTechRhythm‚Äù readiness load from that shape.
# `labs_scale` and `teams_scale` split how strongly that daily base hits lab vs team buckets (same 0‚Äì1 spine, different weights). Optional `backend_scale` (not set here) would add backend mass the same way.
tech:
  weekly_pattern:
    default: medium
    Mon: medium
    Tue: medium
    Thu: medium
    Fri: medium
    Sat: low
    Sun: low
  labs_scale: 1
  teams_scale: 1


