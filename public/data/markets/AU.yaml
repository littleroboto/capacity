# Advent-style retail / marketing build (commercial-led); ramps into December campaign prep overlap.
operating_windows:
  - name: au_festive_countdown_2026
    start: '2026-11-01'
    end: '2026-12-23'
    ramp_in_days: 14
    ramp_out_days: 8
    envelope: smoothstep
    store_pressure_mult: 1.07
    commercial_activity_mult: 1.14
    lab_load_mult: 1.04
    team_load_mult: 1.04
  - name: au_festive_countdown_2027
    start: '2027-11-01'
    end: '2027-12-23'
    ramp_in_days: 14
    ramp_out_days: 8
    envelope: smoothstep
