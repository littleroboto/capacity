  staffing_multiplier: 1.0
  trading_multiplier: 1.0
  load_effects:
    lab_load_mult: 1.0
    team_load_mult: 1.0
    backend_load_mult: 1.0
    ops_activity_mult: 1.0
    commercial_activity_mult: 1.0
#
# Holiday capacity shaping
# ------------------------
# capacity_taper_days — Smooths capacity changes across a few days around each holiday.
# lab_capacity_scale — Target fraction of normal lab/team capacity on peak holiday stress.
#
holidays:
  capacity_taper_days: 0
  lab_capacity_scale: 1.0

#
# Store trading rhythm — restaurant / retail intensity
# ------------------------------------------------------
# Southern-hemisphere seasonal shape: monthly_pattern and seasonal peak in Dec–Jan.
#
trading:
  campaign_store_boost_prep: 0
  campaign_store_boost_live: 0.28
  payday_month_peak_multiplier: 1.12
  monthly_pattern:
    Jan: 0.94
    Feb: 0.90
    Mar: 0.78
    Apr: 0.70
    May: 0.62
    Jun: 0.52
    Jul: 0.48
    Aug: 0.50
    Sep: 0.60
    Oct: 0.70
    Nov: 0.82
    Dec: 1.0
  weekly_pattern:
    Mon: 0.6
    Tue: 0.7
    Wed: 0.8
    Thu: 0.9
    Fri: 1.0
    Sat: 1.0
    Sun: 0.8
  seasonal:
    peak_month: 1
    amplitude: 0.2
