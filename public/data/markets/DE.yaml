# Germany — KMK-style school stubs (`school_holidays.auto`); public bank days (`public_holidays.auto`).
# Campaign narrative: Monopoly 2025–26 ends mid‑Jan 2026; Spring (Easter), summer holidays kickoff,
# Herbst‑Kalender (Oct), then Monopoly 2026–27 as the dominant annual programme (mid‑Nov → mid‑Jan).

# Market identity: `market` is the stable id (routing, manifests, holiday catalogs); `title` is display-only in the UI.
# `risk_heatmap_gamma_tech` / `risk_heatmap_gamma_business` shape how each lens maps combined risk into heatmap colour (transfer-curve exponent; higher → more separation in the mid bands).
# `resources` nominal caps: `labs.capacity` integrated-test labs; `staff.capacity` team headcount denominator; `testing_capacity` optional parallel-test slots for lab utilisation (defaults to lab count when omitted).
market: DE
title: Germany
risk_heatmap_gamma_tech: 1.5
risk_heatmap_gamma_business: 1.5
resources:
  labs:
    capacity: 6
  staff:
    capacity: 4
  testing_capacity: 10

# BAU baseline demand (business-as-usual): repeating weekday loads that sit under tech rhythm, campaigns, and releases in the phase engine.
# `days_in_use` picks which weekdays carry that strip (`mo`…`sun` tokens). `weekly_cycle` sets nominal lab vs team mass (`labs_required`, `staff_required`).
# `support_days` widens each entry’s support window along the week (half-weight BAU support loads on weekdays inside that span, up to Saturday). `integration_tests` adds an extra anchor day with labs-only load alongside the modern weekly BAU.
bau:
  days_in_use: [mo, tu, we, th, fr]
  weekly_cycle:
    labs_required: 1
    staff_required: 1
    support_days: 1
  integration_tests:
    day: Mon
    labs: 1

# Chronological. Monopoly live windows: ~8 weeks mid‑Nov through 2nd week Jan (half‑open duration in engine).

# Campaigns: each list item is one programme. `start_date` anchors the live window; `duration` is the live segment length in days on the calendar.
# `testing_prep_duration` is the load-bearing **prep** runway before live (days). `impact` picks default commercial intensity when you omit a full `load` map; `business_uplift` scales business-side uplift in the risk blend (parser-capped).
# `campaign_support` supplies lab/team-style staffing folded into **prep** loads; `live_campaign_support` does the same for the **live** / sustain phase (alongside optional `live_support_load`, etc., in richer entries).
campaigns:
  - name: monopoly_live_2025_26
    start_date: '2025-11-17'
    duration: 57
    testing_prep_duration: 63
    impact: very_high
    business_uplift: 1.0
    campaign_support:
      labs_required: 1
      tech_staff: 1
    live_campaign_support:
      labs_required: 1
      tech_staff: 1
  - name: spring_campaign_easter_2026
    # 30 live days spanning Easter (Sun 2026-04-05)
    start_date: '2026-03-18'
    duration: 30
    testing_prep_duration: 28
    impact: high
    business_uplift: 0.88
    stagger_functional_loads: true
    campaign_support:
      labs_required: 1
      tech_staff: 1
    live_campaign_support:
      labs_required: 1
      tech_staff: 1
  - name: summer_campaign_2026
    # ~30 days from the start of the German summer school break (varies by Land; anchor late July)
    start_date: '2026-07-24'
    duration: 30
    testing_prep_duration: 28
    impact: high
    business_uplift: 0.9
    campaign_support:
      labs_required: 1
      tech_staff: 1
    live_campaign_support:
      labs_required: 1
      tech_staff: 1
  - name: herbst_kalender_2026
    start_date: '2026-10-01'
    duration: 30
    testing_prep_duration: 24
    impact: medium
    business_uplift: 0.82
    campaign_support:
      labs_required: 1
      tech_staff: 1
    live_campaign_support:
      labs_required: 1
      tech_staff: 1
  - name: monopoly_live_2026_27
    start_date: '2026-11-17'
    duration: 57
    testing_prep_duration: 63
    impact: very_high
    business_uplift: 1.0
    campaign_support:
      labs_required: 1
      tech_staff: 1
    live_campaign_support:
      labs_required: 1
      tech_staff: 1

public_holidays:
  auto: false
  # Stub bank/public holidays — source: src/engine/holidayPublicCatalog.ts (pnpm run sync:market-holidays).
  # Each list entry is one closed day; trailing comments are English display names (not legal calendars).
  # staffing_multiplier / trading_multiplier apply on every listed date.
  dates:
    - '2026-01-01'  # New Year's Day (Neujahr)
    - '2026-04-03'  # Good Friday (Karfreitag)
    - '2026-04-06'  # Easter Monday (Ostermontag)
    - '2026-05-01'  # Labour Day (Tag der Arbeit)
    - '2026-05-14'  # Ascension Day (Christi Himmelfahrt)
    - '2026-05-25'  # Whit Monday (Pfingstmontag)
    - '2026-10-03'  # German Unity Day (Tag der Deutschen Einheit)
    - '2026-12-25'  # Christmas Day (1. Weihnachtstag)
    - '2026-12-26'  # 2nd Christmas Day (2. Weihnachtstag)
    - '2027-01-01'  # New Year's Day (Neujahr)
  staffing_multiplier: 0.5
  trading_multiplier: 1.05

