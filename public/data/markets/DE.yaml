# Germany — KMK / Land school breaks (NRW-style stub in `holidayCalc.ts`). Easter: 2026-04-05, 2027-03-28, 2028-04-16.
# Stub calendars + Monopoly windows span **~five quarters** (MODEL_MONTHS=15) from any quarter start.
