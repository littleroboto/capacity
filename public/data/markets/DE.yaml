    capacity: 6
  staff:
    capacity: 4
    monthly_pattern_basis: absolute
    monthly_pattern:
      Jan: 4
      Feb: 4
      Mar: 4
      Apr: 4
      May: 3
      Jun: 3
      Jul: 3
      Aug: 2
      Sep: 3
      Oct: 4
      Nov: 4
