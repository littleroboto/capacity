# Holiday capacity shaping for lab/team utilisation denominators (which calendar days count as holidays live in `public_holidays` / `school_holidays`).
# `capacity_taper_days`: when >0, holiday “stress” ramps smoothly within ±N days of each listed holiday (easier build-up/cool-down); omit or 0 = stress only on exact holiday dates.
# `lab_capacity_scale`: at full holiday stress, effective lab+team caps move toward this fraction of normal capacity (engine-clamped ~0.12–1; higher = less pinch).
holidays:
  capacity_taper_days: 3
  lab_capacity_scale: 0.5

# Store-trading rhythm (modeled store / restaurant demand): `weekly_pattern` sets a 0–1 level per weekday (raw numbers or tier names like `low` / `medium` / `high` / `very_high` after parse).
# `monthly_pattern` scales that by calendar month; `seasonal` applies a gentle annual wave around `peak_month` with `amplitude`. `payday_month_peak_multiplier` lifts the base in the first part of each month.
# `campaign_store_boost_prep` and `campaign_store_boost_live` add fractional uplift on that base during campaign prep vs live; optional `campaign_effect_scale` in the same block scales both boosts and business-side campaign risk.
trading:
  campaign_store_boost_prep: 0
  campaign_store_boost_live: 0.28
  payday_month_peak_multiplier: 1.12
  campaign_effect_scale: 1.05
  monthly_pattern:
    Jan: 0.56
    Feb: 0.58
    Mar: 0.69
    Apr: 0.77
    May: 0.85
    Jun: 0.91
    Jul: 0.97
    Aug: 0.92
    Sep: 0.84
    Oct: 0.72
    Nov: 0.60
    Dec: 1.0
  weekly_pattern:
    Mon: 0.6
    Tue: 0.7
    Wed: 0.8
    Thu: 0.9
    Fri: 1.0
    Sat: 1.0
    Sun: 0.8
  seasonal:
    peak_month: 7
    amplitude: 0.11

# BAU tech-load rhythm: `weekly_pattern` resolves each weekday to a 0–1 intensity (tiers + `default` / `weekdays` / `weekend` shortcuts are expanded in the parser); the engine emits a daily “TechRhythm” readiness load from that shape.
# `labs_scale` and `teams_scale` split how strongly that daily base hits lab vs team buckets (same 0–1 spine, different weights). Optional `backend_scale` (not set here) would add backend mass the same way.
tech:
  weekly_pattern:
    default: medium
    Mon: medium
    Tue: medium
    Thu: medium
    Fri: medium
    Sat: low
    Sun: low
  labs_scale: 1
  teams_scale: 1

