#
# Holiday capacity shaping
# ------------------------
# capacity_taper_days — Smooths capacity changes across a few days around holidays.
# lab_capacity_scale — Target fraction of normal lab/team capacity on peak stress days.
#
holidays:
  capacity_taper_days: 0
  lab_capacity_scale: 1.0

