# =============================================================================
# Germany — sample market (KMK-style school pattern, manual holiday lists)
# =============================================================================
#
# Campaign story in this sample: a large annual “Monopoly” programme runs from
# mid-November into January; spring (Easter), summer, and autumn windows sit
# between those peaks.
#
# What this file is
# -----------------
# A recipe the planning tool turns into calendar heat maps. Warmer colours mean
# heavier load or tighter capacity for technology teams and restaurants.
#
# How to read it
# --------------
# • Each major section is one topic (capacity, routine work, campaigns, …).
# • Short codes (DE, mo, tu, …) are fixed words the tool recognises.
# • Dates look like 2026-11-17. Indented lists belong to the heading above them.
#
# =============================================================================

#
# Market name and heat-map contrast (optional)
# --------------------------------------------
# market / title — Country code and full name shown in the app.
#
# risk_heatmap_gamma_* — Visual contrast on Technology Teams / Business Teams views.
#
market: DE
title: Germany
risk_heatmap_gamma_tech: 0.35
risk_heatmap_gamma_business: 0.35

#
# Capacity — labs, people, and test throughput
# ---------------------------------------------
# labs.capacity — Integrated lab environments counted as units.
#
# staff.capacity — Full-time-equivalent headcount (team “ceiling”).
#
# testing_capacity — Parallel test slots (widens lab capacity in the model).
#
resources:
  labs:
    capacity: 6
  staff:
    capacity: 4
  testing_capacity: 4

#
# Everyday workload (BAU — business as usual)
# --------------------------------------------
# Steady background work under campaigns and releases.
#
# weekly_cycle — One lab and one staff unit on each peak weekday (sample default).
#   support_days > 0 adds a lighter 0.5× support slice on the same span; 0 keeps BAU minimal.
#
bau:
  days_in_use: [mo, tu, we, th, fr]
  weekly_cycle:
    labs_required: 1
    staff_required: 1
    support_days: 0

#
# Campaigns — marketing and change programmes (chronological in this file)
# ------------------------------------------------------------------------
# Includes long Monopoly live windows (~8 weeks from mid-November) plus Easter,
# summer, autumn, and the following year’s Monopoly window. stagger_functional_loads
# spreads some work types when set.
#
campaigns:
  - name: monopoly_live_2025_26
    start_date: '2025-11-17'
    duration: 57
    testing_prep_duration: 63
    impact: very_high
    business_uplift: 1.0
    campaign_support:
      labs_required: 1
      tech_staff: 1
    live_campaign_support:
      labs_required: 1
      tech_staff: 1
  - name: spring_campaign_easter_2026
    start_date: '2026-03-18'
    duration: 30
    testing_prep_duration: 28
    impact: high
    business_uplift: 0.88
    stagger_functional_loads: true
    campaign_support:
      labs_required: 1
      tech_staff: 1
    live_campaign_support:
      labs_required: 1
      tech_staff: 1
  - name: summer_campaign_2026
    start_date: '2026-07-24'
    duration: 30
    testing_prep_duration: 28
    impact: high
    business_uplift: 0.9
    campaign_support:
      labs_required: 1
      tech_staff: 1
    live_campaign_support:
      labs_required: 1
      tech_staff: 1
  - name: herbst_kalender_2026
    start_date: '2026-10-01'
    duration: 30
    testing_prep_duration: 24
    impact: medium
    business_uplift: 0.82
    campaign_support:
      labs_required: 1
      tech_staff: 1
    live_campaign_support:
      labs_required: 1
      tech_staff: 1
  - name: monopoly_live_2026_27
    start_date: '2026-11-17'
    duration: 57
    testing_prep_duration: 63
    impact: very_high
    business_uplift: 1.0
    campaign_support:
      labs_required: 1
      tech_staff: 1
    live_campaign_support:
      labs_required: 1
      tech_staff: 1

#
# Tech programmes — engineering work that is not a marketing campaign
# -------------------------------------------------------------------
# Same timing keys as campaigns (start_date, duration, testing_prep_duration,
# programme_support, live_programme_support). Only labs / teams / backend count —
# no impact, business_uplift, or store-trading boost. Load accrues on the
# “change & readiness” surface, not the campaign surface.
#
tech_programmes: []

#
# Public holidays — manual list for this sample
# ---------------------------------------------
# Each date is a bank/public closure day. staffing_multiplier and
# trading_multiplier apply to every listed day.
#
public_holidays:
  auto: false
  dates:
    - '2026-01-01'
    - '2026-04-03'
    - '2026-04-06'
    - '2026-05-01'
