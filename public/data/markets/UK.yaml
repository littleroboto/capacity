holidays:
  auto_public: true
  auto_school: true
  # Soften lab/team holiday capacity pinch in the days before/after stub holiday dates (0 = off).
  capacity_taper_days: 3

stress_correlations:
  school_holidays:
    store_pressure_mult: 1.13
    lab_load_mult: 1.06
    team_load_mult: 1.1
    backend_load_mult: 1.04
    ops_activity_mult: 1.06
    commercial_activity_mult: 1.12
    lab_team_capacity_mult: 0.92

# Store / marketing ops rhythm (trading pressure). Optional seasonal wave: busier in northern summer, quieter mid-winter.
trading:
  weekly_pattern:
    default: medium
    Wed: high
    Thu: high
    Fri: very_high
    Sat: very_high
  seasonal:
    peak_month: 7
    amplitude: 0.1

# Technology rhythm (lab/team readiness load) — independent weekly shape, e.g. menu cutover and weekend catch-up.
tech:
  weekly_pattern:
    default: medium
    Mon: high
    Tue: very_high
    Thu: high
    Fri: very_high
    Sat: low
    Sun: low
  labs_scale: 1.25
  teams_scale: 0.65
