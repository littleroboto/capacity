# Belgium — IOM segment sample market (template from PL; holidays are illustrative).

market: BE
title: Belgium



# Capacity — labs, staff (monthly headcount), parallel test slots.

resources:
  labs:
    capacity: 6
  staff:
    capacity: 4
    monthly_pattern_basis: absolute
    monthly_pattern:
      Jan: 4
      Feb: 4
      Mar: 4
      Apr: 4
      May: 3
      Jun: 3
      Jul: 3
      Aug: 2
      Sep: 3
      Oct: 4
      Nov: 4
      Dec: 2
  testing_capacity: 4

# BAU — routine workload + how heavy Market IT / restaurant support is each weekday (0–1).
# (Not tech_programmes — those are dated change projects.)

bau:
  days_in_use: [mo, tu, we, th, fr, sa, su]
  weekly_cycle:
    labs_required: 1
    staff_required: 1
    support_days: 0
  market_it_weekly_load:
    weekday_intensity:
      Mon: 0.870
      Tue: 0.750
      Wed: 0.330
      Thu: 0.290
      Fri: 0.450
      Sat: 0.230
      Sun: 0.240

