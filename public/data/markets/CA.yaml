# =============================================================================
# Canada — sample market (Ontario-style school year)
# =============================================================================
#
# What this file is
# -----------------
# A recipe the planning tool turns into calendar heat maps. Warmer colours mean
# heavier load or tighter capacity for technology teams and restaurants.
#
# How to read it
# --------------
# • Each major section is one topic (capacity, routine work, campaigns, …).
# • Short codes (CA, mo, tu, …) are fixed words the tool recognises.
# • Dates look like 2026-04-02. Indented lists belong to the heading above them.
#
# =============================================================================

#
# Market name and heat-map contrast (optional)
# --------------------------------------------
# market / title — Country code used everywhere in the app, and the full name
#   people see in pickers and titles.
#
# risk_heatmap_gamma_tech / risk_heatmap_gamma_business — “Contrast” on the
#   Technology Teams and Business Teams views. Values near 1.5 are typical;
#   higher stretches mid-range colours apart; lower softens the picture.
#
market: CA
title: Canada
risk_heatmap_gamma_tech: 0.35
risk_heatmap_gamma_business: 0.35

#
# Capacity — labs, people, and test throughput
# ---------------------------------------------
# labs.capacity — How many integrated lab environments you count as units.
#
# staff.capacity — Full-time-equivalent headcount used as the team “ceiling”
#   when the model compares work to available people.
#
# testing_capacity — Parallel test slots. This widens how much lab work the
#   model thinks you can absorb without raising the lab count above.
#
resources:
  labs:
    capacity: 6
  staff:
    capacity: 4
  testing_capacity: 4

#
# Everyday workload (BAU — business as usual)
# --------------------------------------------
# Steady background work that sits under campaigns and releases.
#
# days_in_use — Weekdays that carry the repeating pattern (mo through sun).
#
# weekly_cycle — labs_required and staff_required describe the shape of that
# weekly_cycle — One lab and one staff unit on each peak weekday (sample default).
#   support_days > 0 adds a lighter 0.5× support slice on the same span; 0 keeps BAU minimal.
#
bau:
  days_in_use: [mo, tu, we, th, fr]
  weekly_cycle:
    labs_required: 1
    staff_required: 1
    support_days: 0

#
# Campaigns — marketing and change programmes
# -------------------------------------------
# Each list entry is one programme. The model adds preparation load before
# go-live and higher load while the programme is live.
#
# name — Your label (often includes the year).
#
# start_date / duration — First day of the live window and how many days it runs.
#
# testing_prep_duration — Days of preparation load leading into live (omit if
#   you use a shorter readiness_duration instead on a given programme).
#
# impact — Overall size: low, medium, high, or very_high (drives default intensity).
#
# business_uplift — Extra weight on the business-side view (0–1 scale in the tool).
#
# campaign_support — Lab and tech staff implied during preparation.
#
# live_campaign_support — Lab and tech staff implied during the live window.
#
# readiness_duration — Optional short prep window when you do not set a long
#   testing_prep_duration.
#
campaigns:
  - name: spring_easter_march_peak_2026
    start_date: '2026-04-02'
    duration: 16
    testing_prep_duration: 30
    impact: very_high
    business_uplift: 1.0
    campaign_support:
      labs_required: 1
      tech_staff: 1
    live_campaign_support:
      labs_required: 1
      tech_staff: 1
  - name: summer_school_hol_peak_2026
    start_date: '2026-07-05'
    duration: 48
    testing_prep_duration: 58
    impact: very_high
    business_uplift: 1.0
    campaign_support:
      labs_required: 1
      tech_staff: 1
    live_campaign_support:
      labs_required: 1
      tech_staff: 1
  - name: autumn_thanksgiving_peak_2026
    start_date: '2026-10-03'
    duration: 14
    testing_prep_duration: 30
    impact: high
    business_uplift: 1.0
    campaign_support:
      labs_required: 1
      tech_staff: 1
    live_campaign_support:
      labs_required: 1
      tech_staff: 1
  - name: advent_mega_campaign_2026
    start_date: '2026-12-01'
    duration: 31
    testing_prep_duration: 30
    impact: very_high
    business_uplift: 1.0
    campaign_support:
      labs_required: 1
      tech_staff: 1
    live_campaign_support:
      labs_required: 1
      tech_staff: 1

#
# Tech programmes — engineering work that is not a marketing campaign
# -------------------------------------------------------------------
# Same timing keys as campaigns (start_date, duration, testing_prep_duration,
# programme_support, live_programme_support). Only labs / teams / backend count —
# no impact, business_uplift, or store-trading boost. Load accrues on the
# “change & readiness” surface, not the campaign surface.
#
tech_programmes: []

#
# Public holidays — national or bank closures
# -------------------------------------------
# Which days count as public holidays, and how they tighten capacity or lift
# store demand.
#
# auto — true merges standard dates from the built-in catalog for this market.
#
# dates — Extra calendar days (YYYY-MM-DD), or the full manual list when auto is false.
#
# staffing_multiplier — Effective technology staffing versus a normal day (0–1).
#   0.5 means about half of usual lab and team capacity when the holiday fully applies.
#
# trading_multiplier — Store-side busyness versus the same weekday without the
#   holiday (>1 means busier restaurants on those days).
#
public_holidays:
  auto: true
  dates: []
  staffing_multiplier: 1.0
  trading_multiplier: 1.0

#
# School holidays — term breaks
# -------------------------------
# Same pattern as public holidays, for breaks that affect families and staffing.
#
# auto / dates — Catalog merge versus your own list, as above.
#
# staffing_multiplier / trading_multiplier — Technology capacity and store
#   busyness on those days.
#
# load_effects — Optional extra multipliers applied only on school-holiday days
#   across lab work, team work, backend, operations, and commercial activity.
#
school_holidays:
  auto: true
  dates: []
  staffing_multiplier: 1.0
  trading_multiplier: 1.0
  load_effects:
    lab_load_mult: 1.0
    team_load_mult: 1.0
    backend_load_mult: 1.0
    ops_activity_mult: 1.0
    commercial_activity_mult: 1.0

#
# Holiday capacity shaping
# ------------------------
# Fine-tunes how sharply lab and team ceilings drop around holiday periods.
# Uses the public and school holiday calendars above.
#
# capacity_taper_days — If set (for example 3), capacity eases in and out across
#   a few days around each holiday instead of changing only on the exact date.
#
# lab_capacity_scale — On a “full” holiday-stress day, lab and team ceilings move
#   toward this fraction of normal (0.5 ≈ half of normal capacity).
#
holidays:
  capacity_taper_days: 0
  lab_capacity_scale: 1.0

#
# Store trading rhythm — restaurant / retail intensity
# ------------------------------------------------------
# Baseline customer demand before campaigns add their uplift.
#
# weekly_pattern — Relative busy-ness by weekday (0–1 numbers, or words such as
#   low, medium, high, very_high).
#
# monthly_pattern — How each calendar month scales that baseline through the year.
#
# seasonal — Gentle annual wave using peak_month and amplitude.
#
# payday_month_peak_multiplier — Extra lift in the first part of each month.
#
# campaign_store_boost_prep / campaign_store_boost_live — Additional store demand
#   during campaign preparation versus the live campaign window.
#
trading:
  campaign_store_boost_prep: 0
  campaign_store_boost_live: 0.28
  payday_month_peak_multiplier: 1.12
  monthly_pattern:
    Jan: 0.56
    Feb: 0.58
    Mar: 0.69
    Apr: 0.77
    May: 0.85
    Jun: 0.91
    Jul: 0.97
    Aug: 0.92
    Sep: 0.84
    Oct: 0.72
    Nov: 0.60
    Dec: 1.0
  weekly_pattern:
    Mon: 0.6
    Tue: 0.7
    Wed: 0.8
    Thu: 0.9
    Fri: 1.0
    Sat: 1.0
    Sun: 0.8
  seasonal:
    peak_month: 7
    amplitude: 0.1
