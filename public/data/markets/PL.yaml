# Poland ŌĆö school-year breaks (stub `holidayCalc.ts`).

# Market identity: `market` is the stable id (routing, manifests, holiday catalogs); `title` is display-only in the UI.
# `risk_heatmap_gamma_tech` / `risk_heatmap_gamma_business` shape how each lens maps combined risk into heatmap colour (transfer-curve exponent; higher ŌåÆ more separation in the mid bands).
# `resources` nominal caps: `labs.capacity` integrated-test labs; `staff.capacity` team headcount denominator; `testing_capacity` optional parallel-test slots for lab utilisation (defaults to lab count when omitted).
market: PL
title: Poland
risk_heatmap_gamma_tech: 2.5
risk_heatmap_gamma_business: 2.5
resources:
  labs:
    capacity: 5
  staff:
    capacity: 4
  testing_capacity: 10

# BAU baseline demand (business-as-usual): repeating weekday loads that sit under tech rhythm, campaigns, and releases in the phase engine.
# `days_in_use` picks which weekdays carry that strip (`mo`ŌĆ”`sun` tokens). `weekly_cycle` sets nominal lab vs team mass (`labs_required`, `staff_required`).
# `support_days` widens each entryŌĆÖs support window along the week (half-weight BAU support loads on weekdays inside that span, up to Saturday). `integration_tests` adds an extra anchor day with labs-only load alongside the modern weekly BAU.
bau:
  days_in_use: [mo, tu, we, th, fr]
  weekly_cycle:
    labs_required: 1
    staff_required: 1
    support_days: 1
  integration_tests:
    day: Mon
    labs: 1

# Campaigns: each list item is one programme. `start_date` anchors the live window; `duration` is the live segment length in days on the calendar.
# `testing_prep_duration` is the load-bearing **prep** runway before live (days). `impact` picks default commercial intensity when you omit a full `load` map; `business_uplift` scales business-side uplift in the risk blend (parser-capped).
# `campaign_support` supplies lab/team-style staffing folded into **prep** loads; `live_campaign_support` does the same for the **live** / sustain phase (alongside optional `live_support_load`, etc., in richer entries).
campaigns:
  - name: spring_wielkanoc_peak_2026
    start_date: '2026-04-02'
    duration: 10
    testing_prep_duration: 30
    impact: very_high
    business_uplift: 1.0
    campaign_support:
      labs_required: 1
      tech_staff: 1
    live_campaign_support:
      labs_required: 1
      tech_staff: 1
  - name: summer_wakacje_peak_2026
    start_date: '2026-06-27'
    duration: 62
    testing_prep_duration: 58
    impact: very_high
    business_uplift: 1.0
    campaign_support:
      labs_required: 1
      tech_staff: 1
    live_campaign_support:
      labs_required: 1
      tech_staff: 1
  - name: autumn_jesien_peak_2026
    start_date: '2026-10-23'
    duration: 14
    testing_prep_duration: 30
    impact: high
    business_uplift: 1.0
    campaign_support:
      labs_required: 1
      tech_staff: 1
    live_campaign_support:
      labs_required: 1
      tech_staff: 1
  - name: advent_mega_campaign_2026
    start_date: '2026-12-01'
    duration: 31
    testing_prep_duration: 30
    impact: very_high
    business_uplift: 1.0
    campaign_support:
      labs_required: 1
      tech_staff: 1
    live_campaign_support:
      labs_required: 1
      tech_staff: 1

# National/bank closures: which days count, and how they affect staffing vs store-trading in the model.
public_holidays:
  # true = merge dates from the engineŌĆÖs catalog for this market (see docs/MARKET_DSL_AND_PIPELINE.md, sync:market-holidays).
  auto: true
  # Extra YYYY-MM-DD days on top of auto (or the full manual list when auto is false). Empty = no YAML-only extras.
  dates: []
  # On each public-holiday day: scales effective lab+team capacity (clamped 0ŌĆō1; 0.5 Ōēł half normal caps at full holiday stress).
  staffing_multiplier: 0.5
  # Multiplies the dayŌĆÖs store-trading baseline after rhythm/payday shaping (>1 = busier stores vs the same day without this flag).
  trading_multiplier: 1.04

# School breaks (vacation periods): `auto`/`dates` choose which days count (same pattern as `public_holidays` ŌĆö catalog vs extra ISO YYYY-MM-DD).
# `staffing_multiplier` scales lab+team capacity caps on those days (0ŌĆō1, like public holidays).
# `trading_multiplier` lifts store pressure on those days (multiplies store pressure after campaign boosts).
# `load_effects` bumps modeled demand surfaces on school holidays only (lab/team/backend/ops/commercial multipliers).
school_holidays:
  auto: true
  dates: []
  staffing_multiplier: 0.88
  trading_multiplier: 1.1
  load_effects:
    lab_load_mult: 1.06
    team_load_mult: 1.08
    backend_load_mult: 1.04
    ops_activity_mult: 1.06
    commercial_activity_mult: 1.09

# Holiday capacity shaping for lab/team utilisation denominators (which calendar days count as holidays live in `public_holidays` / `school_holidays`).
# `capacity_taper_days`: when >0, holiday ŌĆ£stressŌĆØ ramps smoothly within ┬▒N days of each listed holiday (easier build-up/cool-down); omit or 0 = stress only on exact holiday dates.
# `lab_capacity_scale`: at full holiday stress, effective lab+team caps move toward this fraction of normal capacity (engine-clamped ~0.12ŌĆō1; higher = less pinch).
holidays:
  capacity_taper_days: 3
  lab_capacity_scale: 0.5

# Store-trading rhythm (modeled store / restaurant demand): `weekly_pattern` sets a 0ŌĆō1 level per weekday (raw numbers or tier names like `low` / `medium` / `high` / `very_high` after parse).
# `monthly_pattern` scales that by calendar month; `seasonal` applies a gentle annual wave around `peak_month` with `amplitude`. `payday_month_peak_multiplier` lifts the base in the first part of each month.
# `campaign_store_boost_prep` and `campaign_store_boost_live` add fractional uplift on that base during campaign prep vs live; optional `campaign_effect_scale` in the same block scales both boosts and business-side campaign risk.
trading:
  campaign_store_boost_prep: 0
  campaign_store_boost_live: 0.28
  payday_month_peak_multiplier: 1.12
  monthly_pattern:
    Jan: 0.56
    Feb: 0.58
    Mar: 0.69
    Apr: 0.77
    May: 0.85
    Jun: 0.91
    Jul: 0.97
    Aug: 0.92
    Sep: 0.84
    Oct: 0.72
    Nov: 0.60
    Dec: 1.0
  weekly_pattern:
    Mon: 0.6
    Tue: 0.7
    Wed: 0.8
    Thu: 0.9
    Fri: 1.0
    Sat: 1.0
    Sun: 0.8
  seasonal:
    peak_month: 7
    amplitude: 0.1

# BAU tech-load rhythm: `weekly_pattern` resolves each weekday to a 0ŌĆō1 intensity (tiers + `default` / `weekdays` / `weekend` shortcuts are expanded in the parser); the engine emits a daily ŌĆ£TechRhythmŌĆØ readiness load from that shape.
# `labs_scale` and `teams_scale` split how strongly that daily base hits lab vs team buckets (same 0ŌĆō1 spine, different weights). Optional `backend_scale` (not set here) would add backend mass the same way.
tech:
  weekly_pattern:
    default: medium
    Mon: medium
    Tue: medium
    Thu: medium
    Fri: medium
    Sat: low
    Sun: low
  labs_scale: 1
  teams_scale: 1

