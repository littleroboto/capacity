# Pushes `dist/` to branch `gh-pages` (reliable; avoids deploy-pages artifact API issues).
#
# After the first green run, set: Repo **Settings → Pages → Build: Deploy from a branch**
# → Branch **gh-pages** → folder **/ (root)** → Save.
#
# Site URL: https://littleroboto.github.io/capacity/  (project Pages)
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          GITHUB_PAGES: 'true'
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
