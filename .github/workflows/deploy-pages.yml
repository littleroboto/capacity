# Optional static mirror only. Primary hosting is Vercel (see README).
# Manual run: Actions → Deploy to GitHub Pages → Run workflow.
#
# After a green run: Repo **Settings → Pages** → deploy from branch **gh-pages** / root.
# Note: no serverless API — shared workspace (`/api/shared-dsl`) exists only on Vercel.
name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
