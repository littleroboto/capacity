# Build the Vite app and publish `dist/` to GitHub Pages.
# Repo settings → Pages → Source: GitHub Actions.
#
# The default GITHUB_TOKEN must include `actions: write` so upload-pages-artifact can publish
# the build output; `pages: write` + `id-token: write` are required for deploy-pages.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Omit configure-pages: it can fail before Pages is enabled and Vite uses relative base (`./`) anyway.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
